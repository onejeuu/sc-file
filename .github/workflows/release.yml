name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            name: Linux
            artifact_name: linux-binary
            binary_name: scfile_linux_x64
            cmd: mv dist/scfile scfile_linux_x64 && chmod +x scfile_linux_x64
          - os: windows-latest
            name: Windows
            artifact_name: windows-binary
            binary_name: scfile_windows_x64.exe
            cmd: mv dist/scfile.exe scfile_windows_x64.exe

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Build Binary
        run: uv run scripts/build.py

      - name: Prepare Artifact
        shell: bash
        run: ${{ matrix.cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_name }}

  publish-package:
    name: Publish PyPi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Build Package
        run: uv build -o ./dist/

      - name: Publish Package
        run: uv publish ./dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-release:
    name: Publish GitHub
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Current Date
        id: date
        run: echo "date=$(date +'%B %d, %Y')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          name: Release ${{ github.ref_name }}
          body: |
            ## `${{ github.ref_name }}` `${{ steps.date.outputs.date }}`
          files: |
            artifacts/windows-binary/scfile_windows_x64.exe
            artifacts/linux-binary/scfile_linux_x64

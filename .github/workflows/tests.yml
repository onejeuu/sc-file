name: Tests

permissions:
  contents: read

on:
  push:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "scfile/**"
      - "tests/**"
      - ".github/workflows/*.yml"

  pull_request:
    paths:
      - "pyproject.toml"
      - "requirements*.txt"
      - "scfile/**"
      - "tests/**"
      - ".github/workflows/*.yml"

jobs:
  tests-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Run Tests
        run: uv run --group dev pytest

  tests-windows:
    name: Windows
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install UV
        uses: astral-sh/setup-uv@v3

      - name: Run Tests
        run: uv run --group dev pytest
